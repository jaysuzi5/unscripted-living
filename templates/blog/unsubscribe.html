{% extends "base.html" %}

{% block title %}Unsubscribed — Unscripted Living{% endblock %}

{% block content %}
<div class="container section-pad">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
      <i class="bi bi-envelope-x display-3 text-muted mb-4 d-block"></i>
      <h1 class="h3 mb-3">You've been unsubscribed</h1>
      <p class="text-muted">{{ email }} has been removed from the newsletter. You won't receive any more emails from us.</p>
      <a href="{% url 'home' %}" class="btn btn-primary mt-3">Back to Home</a>
    </div>
  </div>
</div>
{% endblock %}
