      - img "Big Haul at AAUW Book Fair" [ref=e44]
      - generic [ref=e46]:
        - generic [ref=e47]:
          - generic [ref=e48]:
            - paragraph [ref=e49]: Now that I am retired, I will have plenty of time to read. On Saturday, my wife and I picked up 14 books for $22. A couple of them were on our Amazon Wish List and some of the others were ones that we wanted to read.
            - paragraph [ref=e50]:
              - link [ref=e51] [cursor=pointer]:
                - /url: https://unscripted-living-media.s3.amazonaws.com/markdownx/9f433702-b9a6-44d2-a9eb-b23f1802f6fd.jpg?AWSAccessKeyId=AKIARAV4OZFF527ODPEU&Signature=6loNb8t7GwORvSBX9DhC82VpsFg%3D&Expires=1777333033
                - img [ref=e52]
            - paragraph [ref=e53]: Today we went back for $10 bag day and picked up another 19 books in one bag.
            - paragraph [ref=e54]: Overall, we got 33 books for $32.
            - paragraph [ref=e55]:
              - link [ref=e56] [cursor=pointer]:
                - /url: https://unscripted-living-media.s3.amazonaws.com/markdownx/66813fcb-b846-45e1-a399-725450016e80.jpg?AWSAccessKeyId=AKIARAV4OZFF527ODPEU&Signature=IQrOX7b1jQVeXqZTo7bsuqf%2Fg5s%3D&Expires=1777333449
                - img [ref=e57]
            - paragraph [ref=e58]: "Fun stats:"
            - list [ref=e59]:
              - listitem [ref=e60]: $0.97 per book
              - listitem [ref=e61]: 11918 total pages or average of 361 pages per book
            - paragraph [ref=e62]: This should keep us busy for a long time. We do like to use our local library and some of these books can be found there, but you can't beat under $1 a book and helping out a good cause - they raise money for college expenses for local girls. We will donate these back next year after reading them.
