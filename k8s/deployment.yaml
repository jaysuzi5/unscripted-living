apiVersion: v1
kind: Namespace
metadata:
  name: unscripted-living
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unscripted-living
  namespace: unscripted-living
  labels:
    app: unscripted-living
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unscripted-living
  template:
    metadata:
      labels:
        app: unscripted-living
    spec:
      initContainers:
        - name: migrate
          image: jaysuzi5/unscripted-living:latest
          imagePullPolicy: Always
          command: ["uv", "run", "python", "manage.py", "migrate", "--no-input"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: POSTGRES_DB
              value: "unscripted-living"
            - name: POSTGRES_HOST
              value: "postgresql-rw.postgresql.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: secret_key
      containers:
        - name: unscripted-living
          image: jaysuzi5/unscripted-living:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
              httpHeaders:
                - name: Host
                  value: unscripted.jaycurtis.org
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          env:
            # Django
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings"
            - name: DJANGO_ENV
              value: "production"
            - name: ALLOWED_HOSTS
              value: "unscripted.jaycurtis.org,localhost"
            - name: CSRF_TRUSTED_ORIGINS
              value: "https://unscripted.jaycurtis.org"

            # Secrets
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: secret_key

            # Database
            - name: POSTGRES_DB
              value: "unscripted-living"
            - name: POSTGRES_HOST
              value: "postgresql-rw.postgresql.svc.cluster.local"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: password

            # S3 Media Storage
            - name: AWS_STORAGE_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_bucket
            - name: AWS_S3_REGION_NAME
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_region
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_secret_access_key

            # OpenTelemetry
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "unscripted-living"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.name=unscripted-living"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_LOG_LEVEL
              value: "INFO"
---
apiVersion: v1
kind: Service
metadata:
  name: unscripted-living
  namespace: unscripted-living
spec:
  type: LoadBalancer
  selector:
    app: unscripted-living
  ports:
    - port: 80
      targetPort: 8000
