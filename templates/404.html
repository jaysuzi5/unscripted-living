{% extends "base.html" %}

{% block title %}Page Not Found — Unscripted Living{% endblock %}

{% block content %}
<div class="container section-pad">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center py-5">
      <div class="mb-4" style="font-size: 5rem; line-height: 1; color: var(--color-muted);">404</div>
      <i class="bi bi-compass display-4 text-muted mb-3 d-block"></i>
      <h1 class="h3 mb-2">Page not found</h1>
      <p class="text-muted mb-4">The page you're looking for doesn't exist or may have been moved.</p>
      <div class="d-flex justify-content-center gap-2 flex-wrap">
        <a href="{% url 'home' %}" class="btn btn-primary">
          <i class="bi bi-house me-1"></i>Back to Home
        </a>
        <a href="{% url 'post_list' %}" class="btn btn-outline-secondary">
          <i class="bi bi-card-list me-1"></i>All Posts
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
