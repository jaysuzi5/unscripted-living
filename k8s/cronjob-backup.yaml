---
# Local backup - pg_dump to PVC every 6 hours
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unscripted-living-backup-local
  namespace: unscripted-living
  labels:
    app: unscripted-living
    component: backup
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: unscripted-living
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:17-alpine
            command:
            - /bin/sh
            - -c
            - |
              set -e

              BACKUP_DIR="/backups"
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              BACKUP_FILE="${BACKUP_DIR}/unscripted-living_${TIMESTAMP}.dump"
              RETENTION_DAYS=7

              echo "Starting PostgreSQL backup at $(date)"
              mkdir -p ${BACKUP_DIR}

              PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                -h postgresql-rw.postgresql.svc.cluster.local \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                --verbose \
                --format=custom \
                --compress=9 \
                > "${BACKUP_FILE}"

              if [ -s "${BACKUP_FILE}" ]; then
                BACKUP_SIZE=$(du -h "${BACKUP_FILE}" | cut -f1)
                echo "Backup completed: ${BACKUP_FILE} (${BACKUP_SIZE})"
              else
                echo "ERROR: Backup file is empty or not created!"
                exit 1
              fi

              echo "Cleaning up backups older than ${RETENTION_DAYS} days..."
              find ${BACKUP_DIR} -name "unscripted-living_*.dump" -type f -mtime +${RETENTION_DAYS} -delete

              echo "Current backups:"
              ls -lah ${BACKUP_DIR}/unscripted-living_*.dump 2>/dev/null || echo "No backups found"
              echo "Backup job completed at $(date)"
            env:
            - name: POSTGRES_DB
              value: "unscripted-living"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: password
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: unscripted-living-postgres-backup-pvc

---
# Cloud backup - Daily upload to S3 at 2 AM
apiVersion: batch/v1
kind: CronJob
metadata:
  name: unscripted-living-backup-cloud-daily
  namespace: unscripted-living
  labels:
    app: unscripted-living
    component: backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: unscripted-living
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup-cloud-daily
            image: amazon/aws-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              set -e

              BACKUP_DIR="/backups"
              echo "Starting daily cloud backup upload at $(date)"

              LATEST_BACKUP=$(ls -t ${BACKUP_DIR}/unscripted-living_*.dump 2>/dev/null | head -1)

              if [ -z "${LATEST_BACKUP}" ]; then
                echo "ERROR: No local backup found to upload!"
                exit 1
              fi

              echo "Uploading: ${LATEST_BACKUP} ($(du -h "${LATEST_BACKUP}" | cut -f1))"

              S3_PATH="s3://${S3_BUCKET}/unscripted-living/backups/daily/$(date +%Y/%m/%d)/$(basename ${LATEST_BACKUP})"

              aws s3 cp "${LATEST_BACKUP}" "${S3_PATH}" --storage-class STANDARD_IA

              echo "Uploaded to: ${S3_PATH}"

              echo "Recent daily backups:"
              aws s3 ls "s3://${S3_BUCKET}/unscripted-living/backups/daily/" --recursive | tail -10
              echo "Daily cloud backup completed at $(date)"
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: unscripted-living
                  key: aws_secret_access_key
            - name: S3_BUCKET
              value: "jay-curtis-backup"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
              readOnly: true
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "250m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: unscripted-living-postgres-backup-pvc

