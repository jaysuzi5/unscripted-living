{% extends "account/base.html" %}

{% block title %}Sign Out — Unscripted Living{% endblock %}

{% block body %}
<div class="auth-card card shadow-sm border-0">
  <div class="card-body p-4 text-center">
    <i class="bi bi-box-arrow-right display-6 text-muted mb-3"></i>
    <h2 class="h4 mb-2">Sign out?</h2>
    <p class="text-muted mb-4">You'll need to sign in again to leave comments.</p>
    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <div class="d-grid gap-2">
        <button type="submit" class="btn btn-danger">Yes, sign me out</button>
        <a href="{% url 'home' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
