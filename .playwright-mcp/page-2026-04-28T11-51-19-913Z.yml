        - paragraph [ref=e34]: Had fun at the 64th AAUW Annual Used Book Fair. I felt like a retiree being excited for a book fair.
        - generic [ref=e35]:
          - generic [ref=e36]:
            - generic [ref=e37]: 
            - text: April 27, 2026
          - generic [ref=e38]:
            - generic [ref=e39]: 
